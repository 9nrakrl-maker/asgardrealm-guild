<div class="modal-backdrop" (click)="close.emit()"></div>
<div class="modal" (click)="$event.stopPropagation()">
  <div class="modal-header">
    <h1 class="clickable-td" (click)="openProfile(name)">{{ name }}</h1>
    <button (click)="close.emit()">✖</button>
  </div>
  <div class="modal-body">
    <div *ngIf="levelUpList.length">
      <h4>📈 Level Up Dates</h4>
      <ul>
        <li *ngFor="let e of levelUpList">
          {{ e.date }}
          <span class="level-up">({{ e.level }})</span>
        </li>
      </ul>
    </div>
    <p>
      🔥 EXP Gain Today:
      <b>{{ expGainTodayPercent() }}%</b>
    </p>

    <hr />
    <p>
      📊 Show data for:
      <select [(ngModel)]="selectedRange" (ngModelChange)="onRangeChange($event)">
        <option
          *ngFor="let r of ranges"
          [value]="r"
          [disabled]="r > allRecords.length">
          {{ r }} days
        </option>
      </select>
    </p>
    <canvas id="expChart" height="200"></canvas>

  </div>
</div>
